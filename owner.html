<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner - Percy's World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: white; font-family: Arial; }
        .box { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 30px; max-width: 350px; width: 100%; text-align: center; }
        h1 { color: #e94560; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 15px; font-size: 16px; }
        button { background: #e94560; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .error { color: #ff6b6b; margin-top: 10px; }
        .panel { display: none; }
        .page-links { display: flex; flex-direction: column; gap: 15px; }
        .page-link { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; }
        .page-link a { color: #4d96ff; font-size: 18px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h1>👤 Owner Login</h1>
        <input type="password" id="password" placeholder="Password">
        <button onclick="check()">Login</button>
        <p class="error" id="error"></p>
    </div>
    
    <div class="box panel" id="ownerPanel">
        <h1>👤 Upload Images</h1>
        <p style="color:#ccc;margin-bottom:20px;">Click a page to upload images:</p>
        <div class="page-links">
            <div class="page-link"><a href="fencing.html" target="_blank">🤺 Fencing</a></div>
            <div class="page-link"><a href="3dprinting.html" target="_blank">🖨️ 3D Printing</a></div>
            <div class="page-link"><a href="art.html" target="_blank">🎨 Art</a></div>
        </div>
        <br><br>
        <a href="index.html" style="color:#888;">← Back</a>
    </div>
    
    <script>
        const correctPassword = "chris2026";
        
        function check() {
            if (document.getElementById('password').value === correctPassword) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('ownerPanel').style.display = 'block';
            } else {
                document.getElementById('error').textContent = '❌ Wrong password!';
            }
        }
    </script>
</body>
</html>
