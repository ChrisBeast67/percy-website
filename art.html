<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: white; font-family: Arial; padding: 20px; }
        .container { max-width: 600px; margin: 60px auto 20px; }
        h1 { text-align: center; color: #ffd93d; margin-bottom: 20px; }
        .box { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; margin-bottom: 20px; text-align: center; }
        .box h2 { color: #6bcb77; margin-bottom: 15px; }
        input { padding: 12px; border-radius: 8px; border: none; margin: 10px 0; width: 100%; }
        button { background: #ffd93d; color: #1a1a2e; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .preview { max-width: 200px; border-radius: 10px; margin-top: 15px; display: none; }
        .nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 10px; display: flex; justify-content: center; gap: 15px; }
        .nav a { color: #aaa; text-decoration: none; padding: 8px 15px; border-radius: 20px; }
        .nav a:hover, .nav a.active { background: #ffd93d; color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="fencing.html">Fencing</a>
        <a href="3dprinting.html">3D Print</a>
        <a href="art.html" class="active">Art</a>
    </div>
    <div class="container">
        <h1>🎨 Art</h1>
        <div class="box">
            <h2>📤 Send Image to Percy</h2>
            <p style="color:#ccc;margin-bottom:15px;">Select an image and send it to Percy on Discord!</p>
            <input type="file" id="imageInput" accept="image/*">
            <img id="preview" class="preview">
            <br><br>
            <button onclick="sendImage()">📤 Send to Percy</button>
        </div>
    </div>
    <script>
        document.getElementById('imageInput').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                document.getElementById('preview').src = URL.createObjectURL(e.target.files[0]);
                document.getElementById('preview').style.display = 'block';
            }
        });
        function sendImage() {
            if (!document.getElementById('imageInput').files[0]) {
                alert('Please select an image first!');
                return;
            }
            alert('📸 Please send this image to Percy on Discord and I will add it to the website!');
        }
    </script>
</body>
</html>
