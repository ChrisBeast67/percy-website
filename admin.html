<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Percy's World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; padding: 20px; color: white; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #e94560; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        h2 { color: #6bcb77; margin-bottom: 15px; }
        .btn { background: #4d96ff; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; margin: 5px; }
        .btn:hover { background: #3a7bd5; }
        .input { width: 100%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; font-size: 16px; }
        .links { display: flex; flex-wrap: wrap; gap: 10px; }
        .link-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; flex: 1 1 200px; }
        .link-card a { color: #4d96ff; font-size: 18px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Admin Panel</h1>
        
        <div class="card">
            <h2>🌐 Websites</h2>
            <div class="links">
                <div class="link-card"><a href="https://chrisbeast67.github.io/percy-website" target="_blank">🎮 Percy's World</a></div>
                <div class="link-card"><a href="https://chrisbeast67.github.io/mom-birthday" target="_blank">🎂 Mom Birthday</a></div>
                <div class="link-card"><a href="https://chrisbeast67.github.io/save-earth" target="_blank">🌍 Save Earth</a></div>
            </div>
        </div>
        
        <div class="card">
            <h2>🎮 Games</h2>
            <p>Available: Snake, Pong, Breakout, Racing, Tetris</p>
            <a href="games.html"><button class="btn">Open Games</button></a>
        </div>
        
        <div class="card">
            <h2>📊 Stats</h2>
            <p>Games: 5</p>
            <p>Pages: Home, Games, About</p>
        </div>
        
        <div class="card">
            <a href="index.html"><button class="btn">← Back to Home</button></a>
        </div>
    </div>
</body>
</html>
