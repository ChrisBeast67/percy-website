<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Percy's World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: white; font-family: Arial; }
        .box { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 30px; max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #e94560; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 15px; font-size: 16px; }
        textarea { height: 100px; resize: none; }
        button { background: #e94560; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; margin: 5px; }
        button:hover { background: #d63350; }
        .btn-green { background: #6bcb77; }
        .btn-green:hover { background: #5ab868; }
        .btn-blue { background: #4d96ff; }
        .btn-blue:hover { background: #3a7bd5; }
        .error { color: #ff6b6b; margin-top: 10px; }
        .panel { display: none; }
        .section { margin: 20px 0; text-align: left; }
        .section h2 { color: #6bcb77; margin-bottom: 10px; font-size: 18px; }
        .link { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; margin: 5px 0; }
        .link a { color: #4d96ff; text-decoration: none; }
        .option-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin: 15px 0; text-align: left; }
        .option-box h3 { color: #ffd93d; margin-bottom: 10px; }
        .status { padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
        .status.loading { background: #4d96ff; display: block; }
        .status.success { background: #6bcb77; display: block; }
        .status.error { background: #ff6b6b; display: block; }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h1>🔐 Admin</h1>
        <input type="password" id="password" placeholder="Password">
        <button onclick="check()">Login</button>
        <p class="error" id="error"></p>
    </div>
    
    <div class="box panel" id="adminPanel">
        <h1>⚡ Admin Panel</h1>
        
        <div class="section">
            <h2>🎮 Game Management</h2>
            
            <div class="option-box">
                <h3>Option 2: AI Game Generator</h3>
                <input type="text" id="aiPrompt" placeholder="Describe the game you want (e.g., A puzzle game with falling blocks)">
                <button class="btn-blue" onclick="generateWithAI()">🤖 Generate with AI</button>
                <div id="aiStatus" class="status"></div>
            </div>
        </div>
        
        <div class="section">
            <h2>🎯 Quick Actions</h2>
            <div class="link"><a href="games.html" target="_blank">View All Games</a></div>
            <div class="link"><a href="index.html" target="_blank">Main Website</a></div>
        </div>
        
        <br>
        <a href="index.html" style="color:#888;">← Back</a>
    </div>
    
    <script>
        const correctPassword = "232917";
        
        function check() {
            if (document.getElementById('password').value === correctPassword) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                document.getElementById('error').textContent = '❌ Wrong password!';
            }
        }
        
        function generateWithAI() {
            const prompt = document.getElementById('aiPrompt').value;
            const status = document.getElementById('aiStatus');
            
            if (!prompt) {
                alert('Please describe the game you want!');
                return;
            }
            
            status.className = 'status loading';
            status.textContent = '🤖 AI is generating your game...';
            
            // Simulate AI generation
            setTimeout(() => {
                status.className = 'status success';
                status.textContent = '✅ Game generated! Send this message to Percy on Discord:\n\n' + prompt;
                
                alert('🤖 AI Game Request:\n\n' + prompt + '\n\nPlease send this to Percy on Discord and I will create the game for you!');
            }, 2000);
        }
    </script>
</body>
</html>
