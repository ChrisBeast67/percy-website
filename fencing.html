<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fencing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: white; font-family: Arial; }
        .container { padding: 80px 20px 20px; max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #e94560; }
        .box { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; }
        input { padding: 10px; border-radius: 8px; border: none; margin: 10px 0; }
        button { background: #e94560; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .gallery img { width: 100%; border-radius: 10px; }
        .nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 10px; display: flex; justify-content: center; gap: 15px; }
        .nav a { color: #aaa; text-decoration: none; padding: 8px 15px; border-radius: 20px; }
        .nav a:hover, .nav a.active { background: #e94560; color: white; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="fencing.html" class="active">Fencing</a>
        <a href="3dprinting.html">3D Print</a>
        <a href="art.html">Art</a>
    </div>
    <div class="container">
        <h1>🤺 Fencing</h1>
        <div class="box">
            <input type="file" id="imageInput" accept="image/*">
            <br>
            <button onclick="uploadImage()">Upload</button>
        </div>
        <div class="gallery" id="gallery"></div>
    </div>
    <script>
        document.getElementById('imageInput').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                document.getElementById('gallery').innerHTML += '<img src="' + URL.createObjectURL(e.target.files[0]) + '">';
            }
        });
        function uploadImage() {
            alert('Image uploaded!');
        }
    </script>
</body>
</html>
