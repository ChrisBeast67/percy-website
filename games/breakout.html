<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Breakout - Percy's World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            touch-action: none;
            user-select: none;
        }
        
        h1 {
            color: #e94560;
            margin-bottom: 10px;
        }
        
        .score {
            font-size: 24px;
            color: white;
            margin-bottom: 10px;
        }
        
        canvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            background: #0a0a1a;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b8354a;
        }
        
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b8354a;
        }
        
        .touch-area {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .touch-btn {
            width: 60px;
            height: 60px;
            background: rgba(233, 69, 96, 0.3);
            border: 2px solid #e94560;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .touch-btn:active {
            background: #e94560;
        }
        
        a {
            color: #e94560;
            margin-top: 15px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>🧱 Breakout</h1>
    
    <div class="score">Score: <span id="score">0</span></div>
    
    <canvas id="game" width="320" height="300"></canvas>
    
    <div class="touch-area">
        <div class="touch-btn" id="leftBtn">⬅️</div>
        <div class="touch-btn" id="rightBtn">➡️</div>
    </div>
    
    <div class="controls">
        <button class="btn" id="startBtn">🎮 Start</button>
    </div>
    
    <a href="games.html">← Back to Games</a>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const paddleWidth = 80;
        const paddleHeight = 12;
        const ballRadius = 6;
        const brickRowCount = 5;
        const brickColumnCount = 7;
        
        let paddleX = (canvas.width - paddleWidth) / 2;
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 3;
        let dy = -3;
        let score = 0;
        let gameLoop = null;
        let isRunning = false;
        
        const bricks = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }
        
        const brickWidth = 40;
        const brickHeight = 15;
        const brickPadding = 5;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 10;
        
        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#e94560';
            ctx.fill();
            ctx.closePath();
        }
        
        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight, 5);
            ctx.fillStyle = '#e94560';
            ctx.fill();
            ctx.closePath();
        }
        
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = `hsl(${c * 40 + r * 20}, 70%, 50%)`;
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }
        
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score++;
                            document.getElementById('score').textContent = score;
                            
                            if (score === brickRowCount * brickColumnCount) {
                                alert('YOU WIN! Score: ' + score);
                                resetGame();
                            }
                        }
                    }
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();
            
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            if (y + dy < ballRadius) {
                dy = -dy;
            } else if (y + dy > canvas.height - ballRadius - paddleHeight - 10) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy;
                    dx = (x - (paddleX + paddleWidth / 2)) * 0.1;
                } else if (y + dy > canvas.height - ballRadius) {
                    alert('GAME OVER');
                    resetGame();
                    return;
                }
            }
            
            x += dx;
            y += dy;
        }
        
        function resetGame() {
            score = 0;
            document.getElementById('score').textContent = score;
            x = canvas.width / 2;
            y = canvas.height - 30;
            dx = 3;
            dy = -3;
            paddleX = (canvas.width - paddleWidth) / 2;
            
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r].status = 1;
                }
            }
            
            if (isRunning) {
                clearInterval(gameLoop);
                isRunning = false;
                document.getElementById('startBtn').textContent = '🎮 Start';
            }
            
            draw();
        }
        
        function startGame() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').textContent = '🎮 Running...';
            gameLoop = setInterval(draw, 1000 / 60);
        }
        
        function movePaddle(dir) {
            if (dir === 'left' && paddleX > 0) paddleX -= 20;
            if (dir === 'right' && paddleX < canvas.width - paddleWidth) paddleX += 20;
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.keyCode === 37) movePaddle('left');
            if (e.keyCode === 39) movePaddle('right');
        });
        
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); movePaddle('left'); });
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); movePaddle('right'); });
        document.getElementById('leftBtn').addEventListener('click', () => movePaddle('left'));
        document.getElementById('rightBtn').addEventListener('click', () => movePaddle('right'));
        document.getElementById('startBtn').addEventListener('click', startGame);
        
        draw();
    </script>
</body>
</html>
