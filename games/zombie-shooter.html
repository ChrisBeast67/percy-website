<!DOCTYPE html>
<html>
<head>
<title>Zombie Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; }
#ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; }
#gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 48px; text-align: center; display: none; }
#gameOver button { margin-top: 20px; padding: 10px 30px; font-size: 24px; background: #e94560; color: white; border: none; border-radius: 10px; cursor: pointer; }
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span> | Ammo: <span id="ammo">20</span>/20</div>
<div id="gameOver">
    GAME OVER
    <br>Score: <span id="finalScore">0</span>
    <br><button onclick="restart()">Play Again</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let ammo = 20;
let gameRunning = true;
let bullets = [];
let zombies = [];
let particles = [];
let mouseX = 0, mouseY = 0;

class Bullet {
    constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.speed = 15;
        this.vx = Math.cos(angle) * this.speed;
        this.vy = Math.sin(angle) * this.speed;
        this.radius = 5;
    }
    draw() {
        ctx.fillStyle = '#ffd93d';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
    }
}

class Zombie {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() < 0.5 ? -50 : canvas.height + 50;
        this.radius = 25;
        this.speed = 2 + Math.random() * 2;
        this.hp = 2;
        this.color = `hsl(${Math.random() * 30 + 100}, 70%, 40%)`;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(this.x - 8, this.y - 5, 5, 0, Math.PI * 2);
        ctx.arc(this.x + 8, this.y - 5, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#8b0000';
        ctx.beginPath();
        ctx.arc(this.x, this.y + 5, 8, 0, Math.PI * 2);
        ctx.fill();
    }
    update() {
        let dx = mouseX - this.x;
        let dy = mouseY - this.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
        if (dist < this.radius + 30) {
            gameOver();
        }
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 30;
        this.color = color;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life / 30;
        ctx.fillRect(this.x - 3, this.y - 3, 6, 6);
        ctx.globalAlpha = 1;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
    }
}

function shoot() {
    if (!gameRunning || ammo <= 0) return;
    let angle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);
    bullets.push(new Bullet(canvas.width / 2, canvas.height / 2, angle));
    ammo--;
    document.getElementById('ammo').textContent = ammo;
    if (ammo == 0) reload();
}

function reload() {
    setTimeout(() => { ammo = 20; document.getElementById('ammo').textContent = ammo; }, 1500);
}

function spawnZombie() {
    if (gameRunning) zombies.push(new Zombie());
}

function gameOver() {
    gameRunning = false;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOver').style.display = 'block';
}

function restart() {
    score = 0;
    ammo = 20;
    gameRunning = true;
    bullets = [];
    zombies = [];
    particles = [];
    document.getElementById('score').textContent = score;
    document.getElementById('ammo').textContent = ammo;
    document.getElementById('gameOver').style.display = 'none';
}

canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('click', shoot);
canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); reload(); });

setInterval(spawnZombie, 1500);
setInterval(() => { if (gameRunning) zombies.push(new Zombie()); }, 3000);

function gameLoop() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw crosshair
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 20, 0, Math.PI * 2);
    ctx.stroke();
    
    // Shooter at bottom
    ctx.fillStyle = '#4d96ff';
    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height - 50, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.fillRect(canvas.width / 2 - 5, canvas.height - 100, 10, 50);
    
    bullets.forEach((b, i) => {
        b.update();
        b.draw();
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            bullets.splice(i, 1);
        }
    });
    
    zombies.forEach((z, i) => {
        z.update();
        z.draw();
        bullets.forEach((b, j) => {
            let dx = b.x - z.x;
            let dy = b.y - z.y;
            if (Math.sqrt(dx * dx + dy * dy) < z.radius + b.radius) {
                z.hp--;
                bullets.splice(j, 1);
                if (z.hp <= 0) {
                    for (let k = 0; k < 10; k++) particles.push(new Particle(z.x, z.y, z.color));
                    zombies.splice(i, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;
                }
            }
        });
    });
    
    particles.forEach((p, i) => {
        p.update();
        p.draw();
        if (p.life <= 0) particles.splice(i, 1);
    });
    
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
