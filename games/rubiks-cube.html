<!DOCTYPE html>
<html>
<head>
<title>Rubik's Cube</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial; color: white; overflow: hidden; }
h1 { margin-bottom: 10px; color: #e94560; font-size: 28px; }
.cube-container { perspective: 800px; width: 200px; height: 200px; }
.cube { width: 180px; height: 180px; position: relative; transform-style: preserve-3d; margin: 40px auto; }
.face { position: absolute; width: 180px; height: 180px; display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 3px; border: 3px solid #222; border-radius: 8px; }
.face > div { width: 54px; height: 54px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
.face > div:hover { transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
.white { background: linear-gradient(135deg, #ffffff, #cccccc); }
.yellow { background: linear-gradient(135deg, #ffff00, #ffaa00); }
.red { background: linear-gradient(135deg, #ff0000, #cc0000); }
.orange { background: linear-gradient(135deg, #ff8800, #ff5500); }
.blue { background: linear-gradient(135deg, #0066ff, #0044cc); }
.green { background: linear-gradient(135deg, #00cc00, #008800); }
.black { background: #111; }
.instructions { position: fixed; bottom: 20px; text-align: center; color: #888; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<h1>🧊 Rubik's Cube</h1>
<div class="cube-container"><div class="cube" id="cube"></div></div>
<div class="instructions">
Drag anywhere to rotate the cube<br>
Click a face section to rotate that layer
</div>
<script>
let rotX = -25, rotY = -35;
let isDragging = false, lastX, lastY;
let cube = document.getElementById('cube');
let faces = {
front: ['white','white','white','white','white','white','white','white','white'],
back: ['yellow','yellow','yellow','yellow','yellow','yellow','yellow','yellow','yellow'],
right: ['red','red','red','red','red','red','red','red','red'],
left: ['orange','orange','orange','orange','orange','orange','orange','orange','orange'],
top: ['blue','blue','blue','blue','blue','blue','blue','blue','blue'],
bottom: ['green','green','green','green','green','green','green','green','green']
};
let faceData = [
{ id: 'front', transform: 'rotateY(0deg) translateZ(90px)', colors: ['white','white','white','white','white','white','white','white','white'] },
{ id: 'back', transform: 'rotateY(180deg) translateZ(90px)', colors: ['yellow','yellow','yellow','yellow','yellow','yellow','yellow','yellow','yellow'] },
{ id: 'right', transform: 'rotateY(90deg) translateZ(90px)', colors: ['red','red','red','red','red','red','red','red','red'] },
{ id: 'left', transform: 'rotateY(-90deg) translateZ(90px)', colors: ['orange','orange','orange','orange','orange','orange','orange','orange','orange'] },
{ id: 'top', transform: 'rotateX(90deg) translateZ(90px)', colors: ['blue','blue','blue','blue','blue','blue','blue','blue','blue'] },
{ id: 'bottom', transform: 'rotateX(-90deg) translateZ(90px)', colors: ['green','green','green','green','green','green','green','green','green'] }
];
function render() {
cube.innerHTML = '';
faceData.forEach((f, fi) => {
let el = document.createElement('div');
el.className = 'face';
el.style.transform = f.transform;
for (let i = 0; i < 9; i++) {
let cell = document.createElement('div');
cell.className = f.colors[i];
cell.dataset.face = f.id;
cell.dataset.index = i;
cell.onclick = () => rotateFace(f.id, i);
el.appendChild(cell);
}
cube.appendChild(el);
});
cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}
function rotateFace(faceId, index) {
let row = Math.floor(index / 3);
let col = index % 3;
let face = faceData.find(f => f.id === faceId);
if (!face) return;
let newColors = [...face.colors];
let temp;
// Simple rotation clockwise
temp = newColors[0]; newColors[0] = newColors[6]; newColors[6] = newColors[8]; newColors[8] = newColors[2]; newColors[2] = temp;
temp = newColors[1]; newColors[1] = newColors[3]; newColors[3] = newColors[7]; newColors[7] = temp;
face.colors = newColors;
faces[faceId] = newColors;
render();
}
document.onmousedown = (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; };
document.onmouseup = () => { isDragging = false; };
document.onmousemove = (e) => {
if (!isDragging) return;
let dx = e.clientX - lastX;
let dy = e.clientY - lastY;
rotY += dx * 0.5;
rotX -= dy * 0.5;
lastX = e.clientX;
lastY = e.clientY;
cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
};
document.ontouchstart = (e) => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; };
document.ontouchend = () => { isDragging = false; };
document.ontouchmove = (e) => {
if (!isDragging) return;
let dx = e.touches[0].clientX - lastX;
let dy = e.touches[0].clientY - lastY;
rotY += dx * 0.5;
rotX -= dy * 0.5;
lastX = e.touches[0].clientX;
lastY = e.touches[0].clientY;
cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
};
render();
</script>
</body>
</html>
