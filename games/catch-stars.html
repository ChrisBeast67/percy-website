<!DOCTYPE html>
<html>
<head>
    <title>Catch the Stars</title>
    <style>
        body {
            background: #0f3460;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }
        canvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            background: #16213e;
        }
        #score {
            position: absolute;
            top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="score">Score: <span id="s">0</span></div>
    <canvas id="game" width="550" height="400"></canvas>
    <script>
        const c = document.getElementById('game');
        const ctx = c.getContext('2d');
        let score = 0;
        let player = {x: 275, y: 360};
        let stars = [];
        let enemies = [];
        
        for(let i=0; i<5; i++) stars.push({x: Math.random()*500, y: Math.random()*300});
        
        document.addEventListener('keydown', e => {
            if(e.key==='ArrowLeft' && player.x>10) player.x-=20;
            if(e.key==='ArrowRight' && player.x<520) player.x+=20;
        });
        
        c.addEventListener('click', e => {
            let r = c.getBoundingClientRect();
            player.x = e.clientX - r.left - 15;
        });
        
        function loop() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0,0,550,400);
            
            // Stars
            stars.forEach((s,i) => {
                ctx.font = '25px Arial';
                ctx.fillText('⭐',s.x,s.y+10);
                if(Math.abs(player.x-s.x)<30 && Math.abs(player.y-s.y)<30){
                    score+=10;
                    document.getElementById('s').innerText=score;
                    stars[i]={x:Math.random()*500,y:Math.random()*300};
                }
            });
            
            // Enemies
            if(Math.random()<0.03) enemies.push({x:Math.random()*500,y:-20,s:2+Math.random()*3});
            enemies.forEach((e,i) => {
                e.y+=e.s;
                ctx.font = '25px Arial';
                ctx.fillText('⚡',e.x,e.y+10);
                if(Math.abs(player.x-e.x)<30 && Math.abs(player.y-e.y)<30){
                    alert('Game Over! Score: '+score);
                    score=0;
                    document.getElementById('s').innerText=0;
                    enemies=[];
                }
                if(e.y>420) enemies.splice(i,1);
            });
            
            ctx.font = '30px Arial';
            ctx.fillText('🐱',player.x-15,player.y+10);
            
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
