<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch the Stars - Percy's World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            touch-action: none;
            user-select: none;
        }
        
        h1 {
            color: #ffd93d;
            margin-bottom: 10px;
        }
        
        .score {
            font-size: 24px;
            color: white;
            margin-bottom: 10px;
        }
        
        canvas {
            border: 3px solid #ffd93d;
            border-radius: 10px;
            background: #0a0a1a;
            box-shadow: 0 0 20px rgba(255, 217, 61, 0.3);
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        .btn {
            background: #ffd93d;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c4a632;
        }
        
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #c4a632;
        }
        
        .touch-area {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .touch-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 217, 61, 0.3);
            border: 2px solid #ffd93d;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .touch-btn:active {
            background: #ffd93d;
            color: #1a1a2e;
        }
        
        a {
            color: #ffd93d;
            margin-top: 15px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>⭐ Catch the Stars</h1>
    
    <div class="score">Score: <span id="score">0</span> | Lives: <span id="lives">3</span></div>
    
    <canvas id="game" width="300" height="400"></canvas>
    
    <div class="touch-area">
        <div class="touch-btn" id="leftBtn">⬅️</div>
        <div class="touch-btn" id="rightBtn">➡️</div>
    </div>
    
    <div class="controls">
        <button class="btn" id="startBtn">🎮 Start</button>
    </div>
    
    <a href="games.html">← Back to Games</a>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let playerX = canvas.width / 2 - 25;
        const playerY = canvas.height - 50;
        const playerWidth = 50;
        const playerHeight = 30;
        
        let score = 0;
        let lives = 3;
        let gameLoop = null;
        let isRunning = false;
        
        let stars = [];
        let keys = { left: false, right: false };
        
        function drawPlayer() {
            ctx.fillStyle = '#ffd93d';
            ctx.beginPath();
            ctx.moveTo(playerX + playerWidth / 2, playerY);
            ctx.lineTo(playerX + playerWidth, playerY + playerHeight);
            ctx.lineTo(playerX, playerY + playerHeight);
            ctx.closePath();
            ctx.fill();
        }
        
        function drawStars() {
            stars.forEach(star => {
                ctx.fillStyle = star.color;
                ctx.beginPath();
                ctx.arc(star.x + star.size / 2, star.y + star.size / 2, star.size / 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.fillText('⭐', star.x + 2, star.y + star.size - 2);
            });
        }
        
        function update() {
            if (keys.left && playerX > 10) playerX -= 7;
            if (keys.right && playerX < canvas.width - playerWidth - 10) playerX += 7;
            
            if (Math.random() < 0.03) {
                stars.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -20,
                    size: 25,
                    speed: 2 + Math.random() * 3,
                    color: ['#ffd93d', '#ff6b6b', '#6bcb77', '#4d96ff'][Math.floor(Math.random() * 4)]
                });
            }
            
            stars.forEach((star, i) => {
                star.y += star.speed;
                
                if (star.y > canvas.height) {
                    stars.splice(i, 1);
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    
                    if (lives <= 0) {
                        alert('GAME OVER!\nScore: ' + score);
                        resetGame();
                    }
                }
                
                if (playerX < star.x + star.size &&
                    playerX + playerWidth > star.x &&
                    playerY < star.y + star.size &&
                    playerY + playerHeight > star.y) {
                    stars.splice(i, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;
                }
            });
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
            drawStars();
        }
        
        function resetGame() {
            isRunning = false;
            clearInterval(gameLoop);
            score = 0;
            lives = 3;
            stars = [];
            playerX = canvas.width / 2 - 25;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('startBtn').textContent = '🎮 Start';
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
        }
        
        function startGame() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').textContent = '🎮 Running...';
            gameLoop = setInterval(update, 1000 / 60);
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.keyCode === 37) keys.left = true;
            if (e.keyCode === 39) keys.right = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.keyCode === 37) keys.left = false;
            if (e.keyCode === 39) keys.right = false;
        });
        
        const setupBtn = (id, action) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); action(); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; keys.right = false; });
            btn.addEventListener('click', action);
        };
        
        setupBtn('leftBtn', () => { keys.left = true; setTimeout(() => keys.left = false, 150); });
        setupBtn('rightBtn', () => { keys.right = true; setTimeout(() => keys.right = false, 150); });
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        
        drawPlayer();
    </script>
</body>
</html>
