<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Racing - Percy's World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 10px; font-family: 'Courier New', monospace; }
        .console { background: #FFD700; border-radius: 25px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 -5px 20px rgba(0,0,0,0.2); max-width: 260px; }
        .title { text-align: center; color: #333; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        .screen-border { background: #222; border-radius: 10px; padding: 6px; margin-bottom: 10px; }
        .screen { background: #8BAC0F; border-radius: 6px; padding: 4px; }
        .info-bar { display: flex; justify-content: space-between; font-size: 10px; color: #0F380F; margin-bottom: 4px; }
        canvas { display: block; border: 2px solid #333; }
        .controls { display: flex; justify-content: center; gap: 8px; }
        .dpad-btn { width: 40px; height: 40px; border-radius: 50%; background: #4169E1; border: none; color: white; font-size: 16px; box-shadow: 0 3px 0 #1E3A8A; }
        .dpad-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1E3A8A; }
        .func-btn { width: 35px; height: 25px; border-radius: 5px; border: none; font-size: 10px; font-weight: bold; box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .func-btn.green { background: #00FF00; color: #006400; }
        .func-btn.red { background: #FF0000; color: #8B0000; }
        a { color: #FFD700; margin-top: 10px; display: block; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <div class="console">
        <div class="title">RACING</div>
        <div class="screen-border">
            <div class="info-bar"><span>SCORE: <b id="sc">0</b></span><span>SPEED: <b id="sp">0</b></span></div>
            <div class="screen"><canvas id="g" width="140" height="180"></canvas></div>
        </div>
        <div class="controls">
            <button class="dpad-btn" id="lBtn">⬅</button>
            <button class="func-btn green" id="sBtn">▶</button>
            <button class="dpad-btn" id="rBtn">➡</button>
        </div>
    </div>
    <a href="games.html">← Back</a>
    <script>
        const cv=document.getElementById('g'), cx=cv.getContext('2d');
        let carX=60, roadY=0, speed=3, score=0, obs=[], gl, running=false;
        
        function dr(){
            cx.fillStyle='#333';cx.fillRect(20,0,100,180);
            cx.fillStyle='#666';cx.fillRect(20,0,5,180);cx.fillRect(115,0,5,180);
            cx.strokeStyle='#fff';cx.setLineDash([20,20]);cx.lineDashOffset=-roadY;
            cx.beginPath();cx.moveTo(70,0);cx.lineTo(70,180);cx.stroke();cx.setLineDash([]);
            obs.forEach(o=>{cx.fillStyle=o.c;cx.fillRect(o.x,o.y,20,20);});
            cx.fillStyle='#CC0000';cx.fillRect(carX,145,25,35);
            cx.fillStyle='#FFFF00';cx.fillRect(carX+3,3,19,10);
            document.getElementById('sc').innerText=score;document.getElementById('sp').innerText=speed*10;
        }
        function up(){
            roadY+=speed;if(roadY>40)roadY=0;
            if(Math.random()<0.02){obs.push({x:20+Math.random()*80,y:-20,c:['#3333FF','#00CC00','#CC0000'][Math.floor(Math.random()*3)]});}
            obs.forEach((o,i)=>{o.y+=speed;if(o.y>180){obs.splice(i,1);score+=10;}
            if(carX<o.x+25&&carX+25>o.x&&145<o.y+20&&o.y<165){alert('CRASH! Score: '+score);reset();}});
            if(obs.length>8)obs.shift();dr();
        }
        function reset(){running=false;clearInterval(gl);speed=3;score=0;obs=[];carX=60;document.getElementById('sBtn').innerText='▶';dr();}
        function st(){if(running)return;running=true;document.getElementById('sBtn').innerText='⏸';gl=setInterval(up,50);}
        document.getElementById('lBtn').onclick=()=>{if(carX>25)carX-=10;dr();};
        document.getElementById('rBtn').onclick=()=>{if(carX<90)carX+=10;dr();};
        document.getElementById('sBtn').onclick=st;
        document.onkeydown=e=>{if(e.keyCode==37&&carX>25)carX-=10;if(e.keyCode==39&&carX<90)carX+=10;dr();};
        dr();
    </script>
</body>
</html>
