<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body {
            background: #0f3460;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }
        canvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            background: #16213e;
        }
        h2 { margin: 10px; }
        p { color: #888; }
    </style>
</head>
<body>
    <h2 id="score">Score: 0</h2>
    <canvas id="game" width="400" height="400"></canvas>
    <p>Press any arrow key to start!</p>
    <script type="text/javascript">
        var c = document.getElementById('game');
        var ctx = c.getContext('2d');
        var score = 0;
        var snake = [{x:200,y:200},{x:180,y:200},{x:160,y:200}];
        var appleX = 80;
        var appleY = 80;
        var dx = 0;
        var dy = 0;
        var started = false;
        
        document.onkeydown = function(e) {
            if(!started) { started = true; dx = 20; dy = 0; }
            if(e.keyCode==37 && dx==0) {dx=-20;dy=0;}
            if(e.keyCode==39 && dx==0) {dx=20;dy=0;}
            if(e.keyCode==38 && dy==0) {dx=0;dy=-20;}
            if(e.keyCode==40 && dy==0) {dx=0;dy=20;}
        }
        
        function draw() {
            // Background
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0,0,400,400);
            
            // Draw grid
            ctx.strokeStyle = '#222';
            for(var i=0; i<400; i+=20) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(400,i); ctx.stroke();
            }
            
            // Draw snake
            ctx.fillStyle = '#00ff00';
            for(var i=0;i<snake.length;i++) {
                ctx.fillRect(snake[i].x+1,snake[i].y+1,18,18);
            }
            
            // Draw apple
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(appleX+2,appleY+2,16,16);
            
            if(!started) return;
            
            var head = {x:snake[0].x+dx,y:snake[0].y+dy};
            
            // Wall collision - wrap around!
            if(head.x < 0) head.x = 380;
            if(head.x > 380) head.x = 0;
            if(head.y < 0) head.y = 380;
            if(head.y > 380) head.y = 0;
            
            // Self collision
            var hitSelf = false;
            for(var i=0; i<snake.length; i++) {
                if(snake[i].x == head.x && snake[i].y == head.y) {
                    hitSelf = true;
                }
            }
            
            if(hitSelf) {
                alert('Game Over! Score: ' + score);
                snake = [{x:200,y:200},{x:180,y:200},{x:160,y:200}];
                dx = 0; dy = 0;
                score = 0;
                started = false;
                document.getElementById('score').innerText = 'Score: 0';
            }
            
            // Eat apple
            if(head.x == appleX && head.y == appleY) {
                score += 10;
                document.getElementById('score').innerText = 'Score: ' + score;
                appleX = Math.floor(Math.random()*20)*20;
                appleY = Math.floor(Math.random()*20)*20;
            } else {
                snake.pop();
            }
            
            snake.unshift(head);
        }
        
        setInterval(draw, 200);
    </script>
</body>
</html>
