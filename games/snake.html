<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake - Percy's World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            font-family: 'Courier New', monospace;
            touch-action: none;
            user-select: none;
        }
        
        .console {
            background: #FFD700;
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 -5px 20px rgba(0,0,0,0.2);
            max-width: 320px;
            width: 100%;
        }
        
        .title {
            text-align: center;
            color: #333;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .screen-border {
            background: #222;
            border-radius: 10px;
            padding: 6px;
            margin-bottom: 10px;
        }
        
        .screen {
            background: #8BAC0F;
            border-radius: 6px;
            padding: 4px;
        }
        
        canvas {
            display: block;
            border: 2px solid #333;
        }
        
        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 10px;
            color: #333;
        }
        
        .info-bar span {
            font-weight: bold;
            color: #0F380F;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 32px);
            gap: 3px;
        }
        
        .dpad-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #4169E1;
            border: none;
            color: white;
            font-size: 14px;
            box-shadow: 0 3px 0 #1E3A8A;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dpad-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1E3A8A;
        }
        
        .func-btn {
            width: 28px;
            height: 20px;
            border-radius: 5px;
            border: none;
            font-size: 8px;
            font-weight: bold;
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }
        
        .func-btn.green { background: #00FF00; color: #006400; }
        .func-btn.red { background: #FF0000; color: #8B0000; }
        
        .func-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
        
        a { color: #FFD700; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="console">
        <div class="title">SNAKE</div>
        
        <div class="screen-border">
            <div class="info-bar">
                <div>SCORE: <span id="score">0</span></div>
                <div>HIGH: <span id="highScore">0</span></div>
            </div>
            <div class="screen">
                <canvas id="game" width="180" height="180"></canvas>
            </div>
        </div>
        
        <div class="controls">
            <div class="dpad">
                <div></div>
                <button class="dpad-btn" id="upBtn">⬆</button>
                <div></div>
                <button class="dpad-btn" id="leftBtn">⬅</button>
                <div></div>
                <button class="dpad-btn" id="rightBtn">➡</button>
                <div></div>
                <button class="dpad-btn" id="downBtn">⬇</button>
                <div></div>
            </div>
            
            <div style="display: flex; gap: 5px; flex-direction: column;">
                <button class="func-btn green" id="startBtn">▶</button>
                <button class="func-btn red" id="resetBtn">↺</button>
            </div>
        </div>
    </div>
    
    <a href="games.html">← Back</a>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const grid = 12;
        const tileCount = 15;
        
        let snake = [], food = {x:0,y:0}, dx=1, dy=0, score=0, gameLoop, running=false;
        let highScore = localStorage.getItem('snakeHigh') || 0;
        
        document.getElementById('highScore').textContent = highScore;
        
        function init() {
            snake = [{x:7,y:7},{x:6,y:7},{x:5,y:7}];
            dx=1; dy=0; score=0;
            placeFood();
            draw();
        }
        
        function placeFood() {
            food.x = Math.floor(Math.random()*tileCount);
            food.y = Math.floor(Math.random()*tileCount);
            for(let p of snake) if(p.x==food.x && p.y==food.y) placeFood();
        }
        
        function draw() {
            ctx.fillStyle = '#8BAC0F';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            
            // Grid
            ctx.strokeStyle = 'rgba(15,56,15,0.1)';
            for(let i=0;i<tileCount;i++) {
                ctx.strokeRect(i*grid,0,grid,canvas.height);
                ctx.strokeRect(0,i*grid,canvas.width,grid);
            }
            
            // Food
            ctx.fillStyle = '#CC0000';
            ctx.fillRect(food.x*grid+1, food.y*grid+1, grid-2, grid-2);
            
            // Snake
            snake.forEach((p,i) => {
                ctx.fillStyle = i===0 ? '#0F380F' : '#306230';
                ctx.fillRect(p.x*grid+1, p.y*grid+1, grid-2, grid-2);
            });
            
            document.getElementById('score').textContent = score;
        }
        
        function update() {
            const head = {x:snake[0].x+dx, y:snake[0].y+dy};
            if(head.x<0||head.x>=tileCount||head.y<0||head.y>=tileCount) return gameOver();
            for(let p of snake) if(head.x==p.x && head.y==p.y) return gameOver();
            
            snake.unshift(head);
            if(head.x==food.x && head.y==food.y) { score+=10; placeFood(); }
            else snake.pop();
            draw();
        }
        
        function gameOver() {
            running=false; clearInterval(gameLoop);
            if(score>highScore) { highScore=score; localStorage.setItem('snakeHigh',highScore); document.getElementById('highScore').textContent=highScore; }
            alert('GAME OVER!\nScore: '+score);
            document.getElementById('startBtn').textContent='▶';
        }
        
        function start() {
            if(running) return;
            running=true; init();
            document.getElementById('startBtn').textContent='⏸';
            gameLoop = setInterval(update, 120);
        }
        
        function changeDir(dir) {
            if(!running) return;
            if(dir==='up'&&dy!==1){dx=0;dy=-1}
            else if(dir==='down'&&dy!==-1){dx=0;dy=1}
            else if(dir==='left'&&dx!==1){dx=-1;dy=0}
            else if(dir==='right'&&dx!==-1){dx=1;dy=0}
        }
        
        document.getElementById('startBtn').addEventListener('click',start);
        document.getElementById('resetBtn').addEventListener('click',()=>{running=false;clearInterval(gameLoop);init();document.getElementById('startBtn').textContent='▶';});
        
        ['up','down','left','right'].forEach(dir=>{
            document.getElementById(dir+'Btn').addEventListener('click',()=>changeDir(dir));
        });
        
        document.addEventListener('keydown',e=>{
            if(e.keyCode==37) changeDir('left');
            if(e.keyCode==38) changeDir('up');
            if(e.keyCode==39) changeDir('right');
            if(e.keyCode==40) changeDir('down');
        });
        
        init();
    </script>
</body>
</html>
