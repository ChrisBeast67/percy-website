<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body {
            background: #0f3460;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }
        canvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            background: #16213e;
        }
    </style>
</head>
<body>
    <h2 id="score">Score: 0</h2>
    <canvas id="game" width="400" height="400"></canvas>
    <p>Use Arrow Keys to move</p>
    <script type="text/javascript">
        var c = document.getElementById('game');
        var ctx = c.getContext('2d');
        var score = 0;
        var snake = [{x:200,y:200},{x:180,y:200},{x:160,y:200}];
        var appleX = 100;
        var appleY = 100;
        var dx = 20;
        var dy = 0;
        
        document.onkeydown = function(e) {
            if(e.keyCode==37 && dx==0) {dx=-20;dy=0;}
            if(e.keyCode==39 && dx==0) {dx=20;dy=0;}
            if(e.keyCode==38 && dy==0) {dx=0;dy=-20;}
            if(e.keyCode==40 && dy==0) {dx=0;dy=20;}
        }
        
        function draw() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0,0,400,400);
            
            ctx.fillStyle = '#00ff00';
            for(var i=0;i<snake.length;i++) {
                ctx.fillRect(snake[i].x,snake[i].y,18,18);
            }
            
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(appleX,appleY,18,18);
            
            var head = {x:snake[0].x+dx,y:snake[0].y+dy};
            if(head.x<0||head.x>380||head.y<0||head.y>380||snake.some(function(s){return s.x==head.x && s.y==head.y;})) {
                alert('Game Over! Score: '+score);
                snake=[{x:200,y:200},{x:180,y:200},{x:160,y:200}];
                dx=20;dy=0;score=0;
            }
            
            if(head.x==appleX && head.y==appleY) {
                score+=10;
                document.getElementById('score').innerText = 'Score: '+score;
                appleX = Math.floor(Math.random()*19)*20;
                appleY = Math.floor(Math.random()*19)*20;
            } else {
                snake.pop();
            }
            
            snake.unshift(head);
        }
        
        setInterval(draw,100);
    </script>
</body>
</html>
