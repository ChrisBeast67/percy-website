<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body {
            background: #0f3460;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }
        canvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            background: #16213e;
        }
    </style>
</head>
<body>
    <h2 id="score">Score: 0</h2>
    <canvas id="game" width="400" height="400"></canvas>
    <h3 id="msg">Press Arrow Key to Start!</h3>
    <script>
        var c = document.getElementById('game');
        var ctx = c.getContext('2d');
        var score = 0;
        var snake = [{x:200,y:200},{x:180,y:200},{x:160,y:200}];
        var appleX = 80;
        var appleY = 80;
        var dx = 20;
        var dy = 0;
        var running = true;
        
        document.addEventListener('keydown', changeDirection);
        
        function changeDirection(event) {
            var key = event.keyCode;
            if(key == 37 && dx != 20) { dx = -20; dy = 0; }
            if(key == 39 && dx != -20) { dx = 20; dy = 0; }
            if(key == 38 && dy != 20) { dx = 0; dy = -20; }
            if(key == 40 && dy != -20) { dx = 0; dy = 20; }
        }
        
        function drawGame() {
            // Move snake
            var head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Wall wrap
            if(head.x < 0) head.x = 380;
            if(head.x > 380) head.x = 0;
            if(head.y < 0) head.y = 380;
            if(head.y > 380) head.y = 0;
            
            // Self collision check
            for(var i = 0; i < snake.length; i++) {
                if(snake[i].x == head.x && snake[i].y == head.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // Eat apple
            if(head.x == appleX && head.y == appleY) {
                score += 10;
                document.getElementById('score').innerText = 'Score: ' + score;
                appleX = Math.floor(Math.random() * 20) * 20;
                appleY = Math.floor(Math.random() * 20) * 20;
            } else {
                snake.pop();
            }
            
            // Draw
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, 400, 400);
            
            // Apple
            ctx.fillStyle = 'red';
            ctx.fillRect(appleX, appleY, 18, 18);
            
            // Snake
            ctx.fillStyle = '#00ff00';
            for(var i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x, snake[i].y, 18, 18);
            }
            
            if(running) {
                setTimeout(drawGame, 150);
            }
        }
        
        function gameOver() {
            running = false;
            alert('Game Over! Score: ' + score);
            location.reload();
        }
        
        drawGame();
    </script>
</body>
</html>
