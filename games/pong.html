<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pong - Percy's World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            font-family: 'Courier New', monospace;
        }
        
        .console {
            background: #FFD700;
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 -5px 20px rgba(0,0,0,0.2);
            max-width: 300px;
        }
        
        .title { text-align: center; color: #333; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        
        .screen-border { background: #222; border-radius: 10px; padding: 6px; margin-bottom: 10px; }
        
        .screen { background: #8BAC0F; border-radius: 6px; padding: 4px; }
        
        .score-display { display: flex; justify-content: center; gap: 30px; font-size: 14px; color: #0F380F; font-weight: bold; margin-bottom: 4px; }
        
        canvas { display: block; border: 2px solid #333; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; }
        
        .dpad-btn { width: 32px; height: 32px; border-radius: 50%; background: #4169E1; border: none; color: white; font-size: 14px; box-shadow: 0 3px 0 #1E3A8A; }
        .dpad-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1E3A8A; }
        
        .func-btn { width: 28px; height: 20px; border-radius: 5px; border: none; font-size: 10px; font-weight: bold; box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .func-btn.green { background: #00FF00; color: #006400; }
        .func-btn.red { background: #FF0000; color: #8B0000; }
        
        a { color: #FFD700; margin-top: 10px; display: block; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <div class="console">
        <div class="title">PONG</div>
        <div class="screen-border">
            <div class="score-display"><span id="pScore">0</span> - <span id="cScore">0</span></div>
            <div class="screen"><canvas id="game" width="200" height="120"></canvas></div>
        </div>
        <div class="controls">
            <div style="display:flex;gap:3px;">
                <button class="dpad-btn" id="upBtn">⬆</button>
                <button class="dpad-btn" id="downBtn">⬇</button>
            </div>
            <button class="func-btn green" id="startBtn">▶</button>
        </div>
    </div>
    <a href="games.html">← Back</a>

    <script>
        const cvs = document.getElementById('game'), ctx = cvs.getContext('2d');
        let py=50, cy=50, bx=100, by=60, bxS=3, byS=2, ps=0, cs=0, gameLoop, running=false;
        
        function draw() {
            ctx.fillStyle='#8BAC0F'; ctx.fillRect(0,0,200,120);
            ctx.strokeStyle='rgba(15,56,15,0.3)'; ctx.setLineDash([8,8]);
            ctx.beginPath(); ctx.moveTo(100,0); ctx.lineTo(100,120); ctx.stroke(); ctx.setLineDash([]);
            ctx.fillStyle='#3333FF'; ctx.fillRect(5,py,4,20);
            ctx.fillStyle='#CC0000'; ctx.fillRect(191,cy,4,20);
            ctx.fillStyle='#0F380F'; ctx.beginPath(); ctx.arc(bx,by,4,0,7); ctx.fill();
            document.getElementById('pScore').textContent=ps; document.getElementById('cScore').textContent=cs;
        }
        
        function update() {
            bx+=bxS; by+=byS;
            if(by<4||by>116) byS=-byS;
            if(bx<9&&by>py&&by<py+20) { bxS=Math.abs(bxS); bxS+=0.3; byS+=(by-py-10)*0.15; }
            if(bx>191&&by>cy&&by<cy+20) { bxS=-Math.abs(bxS); bxS-=0.3; }
            if(bx<0) { cs++; reset(); }
            if(bx>200) { ps++; reset(); }
            cy+=(by-(cy+10))*0.08;
            draw();
        }
        
        function reset() { bx=100; by=60; bxS=(Math.random()>0.5?1:-1)*3; byS=(Math.random()-0.5)*3; }
        
        function start() {
            if(running) return;
            running=true; ps=0; cs=0; reset();
            document.getElementById('startBtn').textContent='⏸';
            gameLoop=setInterval(update,1000/60);
        }
        
        document.getElementById('upBtn').onclick=()=>{if(py>0) py-=15; draw();};
        document.getElementById('downBtn').onclick=()=>{if(py<100) py+=15; draw();};
        document.getElementById('startBtn').onclick=start;
        document.onkeydown=e=>{if(e.keyCode==38&&py>0)py-=15;if(e.keyCode==40&&py<100)py+=15;draw();};
        draw();
    </script>
</body>
</html>
