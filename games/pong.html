<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pong - Percy's World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            touch-action: none;
            user-select: none;
        }
        
        h1 {
            color: #4d96ff;
            margin-bottom: 10px;
        }
        
        .score {
            font-size: 32px;
            color: white;
            margin-bottom: 10px;
        }
        
        canvas {
            border: 3px solid #4d96ff;
            border-radius: 10px;
            background: #0a0a1a;
            box-shadow: 0 0 20px rgba(77, 150, 255, 0.3);
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        .btn {
            background: #4d96ff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #2d6bc9;
        }
        
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2d6bc9;
        }
        
        .player-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .control-btn {
            width: 50px;
            height: 50px;
            background: rgba(77, 150, 255, 0.3);
            border: 2px solid #4d96ff;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .control-btn:active {
            background: #4d96ff;
        }
        
        a {
            color: #4d96ff;
            margin-top: 15px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>🏓 Pong</h1>
    
    <div class="score">
        <span id="playerScore">0</span> - <span id="computerScore">0</span>
    </div>
    
    <canvas id="game" width="350" height="250"></canvas>
    
    <div class="player-controls">
        <button class="control-btn" id="upBtn">⬆️</button>
        <button class="control-btn" id="downBtn">⬇️</button>
    </div>
    
    <div class="controls">
        <button class="btn" id="startBtn">🎮 Start</button>
    </div>
    
    <a href="games.html">← Back to Games</a>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const paddleWidth = 10;
        const paddleHeight = 60;
        const ballSize = 8;
        
        let playerY = canvas.height / 2 - paddleHeight / 2;
        let computerY = canvas.height / 2 - paddleHeight / 2;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 4;
        let ballSpeedY = 2;
        let playerScore = 0;
        let computerScore = 0;
        let gameLoop = null;
        let isRunning = false;
        
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Center line
            ctx.strokeStyle = 'rgba(77, 150, 255, 0.3)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Player paddle
            ctx.fillStyle = '#4d96ff';
            ctx.fillRect(10, playerY, paddleWidth, paddleHeight);
            
            // Computer paddle
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(canvas.width - 20, computerY, paddleWidth, paddleHeight);
            
            // Ball
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function update() {
            ballX += ballSpeedX;
            ballY += ballSpeedY;
            
            // Ball collision with top/bottom
            if (ballY - ballSize < 0 || ballY + ballSize > canvas.height) {
                ballSpeedY = -ballSpeedY;
            }
            
            // Player paddle collision
            if (ballX - ballSize < 10 + paddleWidth && 
                ballY > playerY && ballY < playerY + paddleHeight) {
                ballSpeedX = Math.abs(ballSpeedX);
                ballSpeedX += 0.5;
                let deltaY = ballY - (playerY + paddleHeight / 2);
                ballSpeedY = deltaY * 0.2;
            }
            
            // Computer paddle collision
            if (ballX + ballSize > canvas.width - 20 - paddleWidth && 
                ballY > computerY && ballY < computerY + paddleHeight) {
                ballSpeedX = -Math.abs(ballSpeedX);
                ballSpeedX -= 0.5;
            }
            
            // Score
            if (ballX < 0) {
                computerScore++;
                resetBall();
            }
            if (ballX > canvas.width) {
                playerScore++;
                resetBall();
            }
            
            // Computer AI
            let targetY = ballY - paddleHeight / 2;
            computerY += (targetY - computerY) * 0.08;
            
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
            
            draw();
        }
        
        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = (Math.random() > 0.5 ? 1 : -1) * 4;
            ballSpeedY = (Math.random() - 0.5) * 4;
        }
        
        function startGame() {
            if (isRunning) return;
            isRunning = true;
            playerScore = 0;
            computerScore = 0;
            resetBall();
            document.getElementById('startBtn').textContent = '🎮 Running...';
            gameLoop = setInterval(update, 1000 / 60);
        }
        
        function movePlayer(dir) {
            if (!isRunning) return;
            if (dir === 'up' && playerY > 0) playerY -= 25;
            if (dir === 'down' && playerY < canvas.height - paddleHeight) playerY += 25;
        }
        
        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.keyCode === 38) movePlayer('up');
            if (e.keyCode === 40) movePlayer('down');
        });
        
        // Touch/Buttons
        document.getElementById('upBtn').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer('up'); });
        document.getElementById('downBtn').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer('down'); });
        document.getElementById('upBtn').addEventListener('click', () => movePlayer('up'));
        document.getElementById('downBtn').addEventListener('click', () => movePlayer('down'));
        document.getElementById('startBtn').addEventListener('click', startGame);
        
        draw();
    </script>
</body>
</html>
